name: iosApp
options:
  bundleIdPrefix: org.scottishtecharmy.soundscape
  deploymentTarget:
    iOS: "16.0"
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig
settings:
  ENABLE_BITCODE: "NO"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
      - path: iosApp/address
        type: folder
    info:
      path: iosApp/Info.plist
      properties:
        CADisableMinimumFrameDurationOnPhone: true
        NSLocationWhenInUseUsageDescription: "Soundscape needs your location to provide audio navigation and describe your surroundings."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Soundscape needs your location to provide audio navigation even when the app is in the background."
        UIBackgroundModes:
          - audio
          - location
        UILaunchScreen: {}
        TileProviderURL: "$(TILE_PROVIDER_URL)"
        SearchProviderURL: "$(SEARCH_PROVIDER_URL)"
        ExtractProviderURL: "$(EXTRACT_PROVIDER_URL)"
    settings:
      FRAMEWORK_SEARCH_PATHS:
        - "$(inherited)"
        - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
      OTHER_LINKER_FLAGS:
        - "$(inherited)"
        - "-framework"
        - "Shared"
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
